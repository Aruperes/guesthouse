<!doctype html>
<html lang="id">
  <head>
    <meta charset="UTF-8" />
    <title>Operator Monitor - Live System</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link
      href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;700&display=swap"
      rel="stylesheet"
    />
    <style>
      body {
        font-family: "Plus Jakarta Sans", sans-serif;
      }
      .glow-red {
        box-shadow: 0 0 30px rgba(239, 68, 68, 0.4);
      }
      .video-container {
        aspect-ratio: 16 / 9;
      }
    </style>
  </head>
  <body
    class="bg-slate-50 text-slate-800 overflow-hidden h-screen flex flex-col"
  >
    <nav
      class="bg-white/80 backdrop-blur-md border-b border-slate-100 px-8 py-4 flex justify-between items-center shrink-0"
    >
      <div class="flex items-center gap-3">
        <div
          class="w-10 h-10 bg-indigo-600 rounded-xl flex items-center justify-center text-white font-bold shadow-lg shadow-indigo-100"
        >
          O
        </div>
        <div>
          <h1 class="text-lg font-black tracking-tight leading-none">
            Operator <span class="text-indigo-600">Monitor</span>
          </h1>
          <p
            class="text-[10px] text-slate-400 font-bold uppercase tracking-widest mt-1"
          >
            Live Identification System
          </p>
        </div>
      </div>
      <div class="flex items-center gap-4">
        <div class="flex items-center gap-2 px-4 py-2 bg-green-50 rounded-xl">
          <div class="w-2 h-2 bg-green-500 rounded-full animate-pulse"></div>
          <span class="text-xs font-bold text-green-600">Sistem Aktif</span>
        </div>
        <a
          href="/logout"
          class="px-5 py-2.5 bg-red-50 text-red-600 rounded-xl font-bold hover:bg-red-600 hover:text-white transition-all text-sm"
          >Logout</a
        >
      </div>
    </nav>

    <div class="flex-1 flex overflow-hidden p-6 gap-6">
      <div class="flex-1 flex flex-col gap-6">
        <div
          class="relative flex-1 bg-slate-900 rounded-[2.5rem] overflow-hidden shadow-2xl shadow-slate-200 border-4 border-white"
        >
          <img
            src="{{ url_for('video_feed') }}"
            class="w-full h-full object-cover"
          />

          <div
            id="strangerAlert"
            class="hidden absolute inset-0 bg-red-600/20 backdrop-blur-sm flex items-center justify-center animate-pulse"
          >
            <div
              class="bg-white p-8 rounded-[2rem] text-center shadow-2xl glow-red"
            >
              <div
                class="text-5xl mb-4 text-red-600 uppercase font-black italic"
              >
                Stranger!
              </div>
              <p class="text-slate-600 font-bold">
                Wajah tidak dikenal terdeteksi!
              </p>
            </div>
          </div>

          <div class="absolute bottom-8 left-8">
            <button
              onclick="toggleCamera()"
              id="btnCam"
              class="bg-indigo-600 text-white px-8 py-4 rounded-2xl font-bold shadow-xl hover:scale-105 transition-all"
            >
              Matikan Kamera
            </button>
          </div>
        </div>
      </div>

      <div class="w-96 flex flex-col gap-6 overflow-y-auto pr-2">
        <div
          class="bg-white p-8 rounded-[2.5rem] shadow-sm border border-slate-100 shrink-0"
        >
          <h3
            class="text-xs font-black text-slate-400 uppercase tracking-widest mb-6"
          >
            Hasil Identifikasi
          </h3>

          <div class="flex flex-col items-center text-center">
            <div
              class="w-32 h-32 bg-slate-50 rounded-[2rem] mb-6 flex items-center justify-center border-2 border-slate-100"
            >
              <span id="initialName" class="text-5xl font-black text-indigo-600"
                >-</span
              >
            </div>
            <h2
              id="resNama"
              class="text-2xl font-black text-slate-800 leading-tight"
            >
              -
            </h2>
            <p
              id="resNIM"
              class="text-indigo-600 font-mono font-bold mt-1 text-sm"
            >
              -
            </p>
            <div
              id="resStatusBadge"
              class="mt-4 px-4 py-1.5 bg-slate-100 text-slate-500 rounded-xl text-[10px] font-black uppercase tracking-widest"
            >
              Menunggu...
            </div>
          </div>
        </div>

        <div
          class="bg-indigo-600 p-8 rounded-[2.5rem] shadow-xl shadow-indigo-100 text-white shrink-0"
        >
          <div class="flex justify-between items-center mb-4">
            <span
              class="text-[10px] font-black uppercase tracking-widest text-indigo-200"
              >Sesi Kehadiran</span
            >
            <span class="p-2 bg-white/20 rounded-lg">📊</span>
          </div>
          <div class="flex items-baseline gap-2">
            <h4 id="statHadir" class="text-5xl font-black">0</h4>
            <span class="text-indigo-200 font-bold">Mahasiswa</span>
          </div>
          <p class="text-xs text-indigo-100 mt-2 font-medium">
            Teridentifikasi hari ini
          </p>
        </div>
      </div>
    </div>

    <script>
      let isAlerting = false;
      let audioCtx = null;
      let oscillator = null;
      let gainNode = null;

      function startAlarmSound() {
        if (!audioCtx)
          audioCtx = new (window.AudioContext || window.webkitAudioContext)();
        if (oscillator) return;
        oscillator = audioCtx.createOscillator();
        gainNode = audioCtx.createGain();
        oscillator.type = "square";
        oscillator.frequency.setValueAtTime(880, audioCtx.currentTime);

        gainNode.gain.setValueAtTime(0.1, audioCtx.currentTime);

        oscillator.connect(gainNode);
        gainNode.connect(audioCtx.destination);
        oscillator.start();

        let rising = true;
        this.sirenInterval = setInterval(() => {
          if (!oscillator) return;
          oscillator.frequency.exponentialRampToValueAtTime(
            rising ? 1200 : 800,
            audioCtx.currentTime + 0.4,
          );
          rising = !rising;
        }, 500);
      }

      function stopAlarmSound() {
        if (oscillator) {
          oscillator.stop();
          oscillator.disconnect();
          oscillator = null;
          clearInterval(this.sirenInterval);
        }
      }

      document.addEventListener(
        "click",
        () => {
          if (!audioCtx)
            audioCtx = new (window.AudioContext || window.webkitAudioContext)();
          if (audioCtx.state === "suspended") audioCtx.resume();
        },
        { once: true },
      );

      async function monitorSystem() {
        try {
          const res = await fetch("/get_status");
          const data = await res.json();

          const alertEl = document.getElementById("strangerAlert");
          const resNama = document.getElementById("resNama");
          const badge = document.getElementById("resStatusBadge");
          const initial = document.getElementById("initialName");

          resNama.innerText = data.nama;
          document.getElementById("resNIM").innerText =
            data.nim !== "-" ? "NIM: " + data.nim : "-";
          document.getElementById("statHadir").innerText = data.count_sesi;
          initial.innerText = data.nama !== "-" ? data.nama[0] : "-";

          if (data.status === "ASRAMA") {
            badge.innerText = "Mahasiswa Asrama";
            badge.className =
              "mt-4 px-4 py-1.5 bg-green-100 text-green-600 rounded-xl text-[10px] font-black uppercase tracking-widest";
          } else {
            badge.innerText = data.status === "-" ? "Menunggu..." : data.status;
            badge.className =
              "mt-4 px-4 py-1.5 bg-slate-100 text-slate-500 rounded-xl text-[10px] font-black uppercase tracking-widest";
          }

          if (data.is_stranger) {
            if (!isAlerting) {
              alertEl.classList.remove("hidden");
              startAlarmSound();
              isAlerting = true;
            }
          } else {
            if (isAlerting) {
              alertEl.classList.add("hidden");
              stopAlarmSound();
              isAlerting = false;
            }
          }
        } catch (e) {
          console.error("Server Down");
        }
      }

      setInterval(monitorSystem, 1000);

      function toggleCamera() {
        fetch("/toggle_camera", { method: "POST" })
          .then((res) => res.json())
          .then((data) => {
            const btn = document.getElementById("btnCam");
            btn.innerText = data.active ? "Matikan Kamera" : "Aktifkan Kamera";
            btn.className = data.active
              ? "bg-indigo-600 text-white px-8 py-4 rounded-2xl font-bold shadow-xl hover:scale-105 transition-all"
              : "bg-red-600 text-white px-8 py-4 rounded-2xl font-bold shadow-xl hover:scale-105 transition-all";
          });
      }
    </script>
  </body>
</html>
