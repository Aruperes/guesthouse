<!doctype html>
<html lang="id">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Monitor Operator - Asrama GH</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>
  </head>
  <body class="bg-gray-100 font-sans">
    <div class="container mx-auto p-6">
      <div
        class="flex justify-between items-center bg-white p-4 rounded-lg shadow mb-6"
      >
        <h1 class="text-2xl font-bold text-gray-800">
          Sistem Monitoring Asrama
        </h1>
        <div class="space-x-2">
          <button
            id="camBtn"
            onclick="toggleKamera()"
            class="bg-blue-600 text-white px-4 py-2 rounded shadow hover:bg-blue-700"
          >
            Aktifkan Kamera
          </button>
          <a
            href="/logout"
            class="bg-red-500 text-white px-4 py-2 rounded shadow hover:bg-red-600"
            >Logout</a
          >
        </div>
      </div>

      <div class="grid grid-cols-1 lg:grid-cols-3 gap-6">
        <div class="lg:col-span-2 bg-white p-4 rounded-lg shadow">
          <h2 class="text-lg font-semibold mb-4 text-gray-700">
            Live Camera Feed
          </h2>
          <div
            class="relative bg-black rounded-lg overflow-hidden aspect-video border-4 border-gray-200"
          >
            <img
              id="videoFeed"
              src="{{ url_for('video_feed') }}"
              class="w-full h-full object-contain"
            />
          </div>
        </div>

        <div class="bg-white p-4 rounded-lg shadow">
          <h2 class="text-lg font-semibold mb-4 text-gray-700 border-b pb-2">
            Riwayat Deteksi Terkini
          </h2>

          <div id="log-list" class="space-y-3 h-[450px] overflow-y-auto pr-2">
            {% for item in history %}
            <div
              class="flex justify-between items-center p-3 rounded-lg border-l-4 {{ 'bg-green-50 border-green-500' if item.status == 'ASRAMA' else 'bg-red-50 border-red-500' }}"
            >
              <div>
                <p
                  class="font-bold {{ 'text-green-700' if item.status == 'ASRAMA' else 'text-red-700' }}"
                >
                  {{ item.nama }}
                </p>
                <p class="text-xs text-gray-500">{{ item.waktu }}</p>
              </div>
              <span
                class="text-xs font-semibold px-2 py-1 rounded {{ 'bg-green-200 text-green-800' if item.status == 'ASRAMA' else 'bg-red-200 text-red-800' }}"
              >
                {{ item.status }}
              </span>
            </div>
            {% endfor %} {% if not history %}
            <p class="text-center text-gray-400 mt-10">Belum ada deteksi...</p>
            {% endif %}
          </div>
        </div>
      </div>
    </div>

    <script>
      // Fungsi On/Off Kamera
      function toggleKamera() {
        fetch("/toggle_camera", { method: "POST" })
          .then((response) => response.json())
          .then((data) => {
            const btn = document.getElementById("camBtn");
            if (data.active) {
              btn.innerText = "Matikan Kamera";
              btn.classList.replace("bg-blue-600", "bg-red-600");
            } else {
              btn.innerText = "Aktifkan Kamera";
              btn.classList.replace("bg-red-600", "bg-blue-600");
            }
            // Paksa refresh feed gambar
            document.getElementById("videoFeed").src =
              "{{ url_for('video_feed') }}?" + new Date().getTime();
          });
      }

      // Auto Refresh riwayat setiap 3 detik
      function refreshRiwayat() {
        // Memuat ulang hanya bagian log-list saja
        $("#log-list").load(window.location.href + " #log-list");
      }

      setInterval(refreshRiwayat, 10000);
    </script>
  </body>
</html>
