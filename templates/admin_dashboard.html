<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <title>Admin Dashboard</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link
      href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;700&display=swap"
      rel="stylesheet"
    />
    <style>
      body {
        font-family: "Plus Jakarta Sans", sans-serif;
      }
    </style>
  </head>
  <body class="bg-slate-50 text-slate-800">
    <nav
      class="bg-white/80 backdrop-blur-md sticky top-0 z-50 border-b border-slate-100 px-10 py-4 flex justify-between items-center"
    >
      <div class="flex items-center gap-3">
        <div
          class="w-10 h-10 bg-indigo-600 rounded-xl flex items-center justify-center text-white font-bold"
        >
          A
        </div>
        <h1 class="text-xl font-black tracking-tight text-slate-800">
          Admin <span class="text-indigo-600">Panel</span>
        </h1>
      </div>
      <a
        href="/logout"
        class="px-5 py-2.5 bg-red-50 text-red-600 rounded-xl font-bold hover:bg-red-600 hover:text-white transition-all"
        >Logout</a
      >
    </nav>

    <div class="p-10 max-w-7xl mx-auto">
      <div class="grid grid-cols-1 md:grid-cols-3 gap-6 mb-10">
        <div
          class="bg-white p-8 rounded-[2rem] shadow-sm border border-slate-100"
        >
          <p
            class="text-slate-400 font-bold text-xs uppercase tracking-widest mb-1"
          >
            Total Mahasiswa
          </p>
          <h3 class="text-4xl font-black text-slate-800">{{ total }}</h3>
        </div>
        <div
          class="bg-indigo-600 p-8 rounded-[2rem] shadow-lg shadow-indigo-100 text-white"
        >
          <p
            class="text-indigo-200 font-bold text-xs uppercase tracking-widest mb-1"
          >
            Mahasiswa Asrama
          </p>
          <h3 class="text-4xl font-black">{{ asrama }}</h3>
        </div>
        <div
          class="bg-white p-8 rounded-[2rem] shadow-sm border border-slate-100"
        >
          <p
            class="text-slate-400 font-bold text-xs uppercase tracking-widest mb-1"
          >
            Mahasiswa Luar
          </p>
          <h3 class="text-4xl font-black text-orange-500">
            {{ total - asrama }}
          </h3>
        </div>
      </div>

      <div
        class="bg-white p-8 rounded-[2.5rem] shadow-sm border border-slate-100 mb-10"
      >
        <h2 class="text-lg font-bold mb-6 flex items-center gap-2">
          <span class="w-2 h-6 bg-indigo-600 rounded-full"></span>
          Registrasi Mahasiswa Baru
        </h2>
        <form
          action="/admin/add"
          method="POST"
          class="grid grid-cols-1 md:grid-cols-4 gap-4"
        >
          <input
            type="text"
            name="nim"
            placeholder="Nomor Registrasi (NIM)"
            class="p-4 bg-slate-50 border border-slate-100 rounded-2xl focus:ring-2 focus:ring-indigo-500 outline-none"
            required
          />
          <input
            type="text"
            name="nama"
            placeholder="Nama Lengkap"
            class="p-4 bg-slate-50 border border-slate-100 rounded-2xl focus:ring-2 focus:ring-indigo-500 outline-none"
            required
          />
          <select
            name="status"
            class="p-4 bg-slate-50 border border-slate-100 rounded-2xl outline-none"
          >
            <option value="ASRAMA">Asrama</option>
            <option value="OUTSIDER">Outsider</option>
          </select>
          <button
            type="submit"
            class="bg-indigo-600 text-white font-bold rounded-2xl hover:bg-indigo-700 transition-all shadow-lg shadow-indigo-100"
          >
            Simpan Data
          </button>
        </form>
      </div>

      <div
        class="bg-white rounded-[2.5rem] shadow-sm border border-slate-100 overflow-hidden"
      >
        <table class="w-full">
          <thead class="bg-slate-50 border-b border-slate-100">
            <tr>
              <th
                class="p-6 text-left text-xs font-bold text-slate-400 uppercase tracking-widest"
              >
                Mahasiswa
              </th>
              <th
                class="p-6 text-left text-xs font-bold text-slate-400 uppercase tracking-widest"
              >
                Status
              </th>
              <th
                class="p-6 text-right text-xs font-bold text-slate-400 uppercase tracking-widest"
              >
                Opsi
              </th>
            </tr>
          </thead>
          <tbody class="divide-y divide-slate-50">
            {% for m in mahasiswa %}
            <tr class="hover:bg-slate-50/50 transition-colors">
              <td class="p-6">
                <div class="flex flex-col">
                  <a
                    href="/admin/view/{{ m.id }}"
                    class="font-bold text-slate-800 hover:text-indigo-600 transition-colors"
                    >{{ m.nama_lengkap }}</a
                  >
                  <span class="text-sm text-slate-400 font-mono"
                    >{{ m.nomor_registrasi }}</span
                  >
                </div>
              </td>
              <td class="p-6">
                <span
                  class="px-4 py-1.5 rounded-xl text-xs font-black {{ 'bg-indigo-100 text-indigo-600' if m.status == 'ASRAMA' else 'bg-orange-100 text-orange-600' }}"
                >
                  {{ m.status }}
                </span>
              </td>
              <td class="p-6 text-right">
                <button
                  class="text-red-400 hover:text-red-600 font-bold text-sm"
                >
                  Hapus
                </button>
              </td>
            </tr>
            {% endfor %}
          </tbody>
        </table>
      </div>
    </div>
  </body>
</html>
