<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <title>Login - Dining Identification System</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link
      href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;700&display=swap"
      rel="stylesheet"
    />
    <style>
      body {
        font-family: "Plus Jakarta Sans", sans-serif;
      }
    </style>
  </head>
  <body class="bg-slate-50 flex items-center justify-center h-screen">
    <div
      class="bg-white p-10 rounded-3xl shadow-xl shadow-slate-200 w-full max-w-md border border-slate-100"
    >
      <div class="text-center mb-8">
        <div
          class="inline-flex items-center justify-center w-16 h-16 bg-indigo-600 rounded-2xl mb-4 shadow-lg shadow-indigo-200"
        >
          <span class="text-white text-2xl font-bold">D</span>
        </div>
        <h2 class="text-2xl font-extrabold text-slate-800">Selamat Datang</h2>
        <p class="text-slate-500 mt-2">
          Sistem Monitoring Dining Asrama GuestHouse
        </p>
      </div>

      {% if error %}
      <div
        class="mb-6 p-4 bg-red-50 border border-red-100 rounded-2xl flex items-center gap-3 animate-bounce"
      >
        <span class="text-red-500">⚠️</span>
        <p class="text-red-600 text-sm font-semibold">{{ error }}</p>
      </div>
      {% endif %}

      <form action="/login" method="POST" class="space-y-5">
        <div>
          <label class="block text-sm font-bold text-slate-700 mb-2"
            >Username / Nomor Registrasi</label
          >
          <input
            type="text"
            name="username"
            class="w-full px-4 py-3 bg-slate-50 border border-slate-200 rounded-xl focus:ring-4 focus:ring-indigo-100 focus:border-indigo-500 outline-none transition-all"
            placeholder="Masukkan Username/Nomor Registrasi Anda"
            required
          />
        </div>
        <div>
          <label class="block text-sm font-bold text-slate-700 mb-2"
            >Password</label
          >
          <input
            type="password"
            name="password"
            class="w-full px-4 py-3 bg-slate-50 border border-slate-200 rounded-xl focus:ring-4 focus:ring-indigo-100 focus:border-indigo-500 outline-none transition-all"
            placeholder="••••••••"
            required
          />
        </div>
        <div>
          <label class="block text-sm font-bold text-slate-700 mb-2"
            >Role Akses</label
          >
          <select
            name="role"
            class="w-full px-4 py-3 bg-slate-50 border border-slate-200 rounded-xl focus:ring-4 focus:ring-indigo-100 focus:border-indigo-500 outline-none transition-all cursor-pointer"
          >
            <option value="mahasiswa">Mahasiswa</option>
            <option value="operator">Operator</option>
            <option value="admin">Admin</option>
          </select>
        </div>
        <button
          type="submit"
          class="w-full bg-indigo-600 hover:bg-indigo-700 text-white py-4 rounded-2xl font-bold shadow-lg shadow-indigo-100 transition-all transform active:scale-[0.98]"
        >
          MASUK KE SISTEM
        </button>
      </form>
    </div>
  </body>
</html>
