<!doctype html>
<html lang="id">
  <head>
    <meta charset="UTF-8" />
    <title>Login - Sistem Identifikasi Dining</title>
    <script src="https://cdn.tailwindcss.com"></script>
  </head>
  <body class="bg-gray-100 flex items-center justify-center h-screen">
    <div class="bg-white p-8 rounded-xl shadow-lg w-96">
      <h2 class="text-2xl font-bold text-center mb-6 text-blue-600">
        Login Sistem
      </h2>

      {% with messages = get_flashed_messages() %} {% if messages %} {% for
      message in messages %}
      <p class="text-red-500 text-sm mb-4 text-center">{{ message }}</p>
      {% endfor %} {% endif %} {% endwith %}

      <form action="/login" method="POST">
        <div class="mb-4">
          <label class="block text-sm font-semibold mb-1">Username</label>
          <input
            type="text"
            name="username"
            class="w-full border rounded-lg p-2"
            required
          />
        </div>
        <div class="mb-4">
          <label class="block text-sm font-semibold mb-1">Password</label>
          <input
            type="password"
            name="password"
            class="w-full border rounded-lg p-2"
            required
          />
        </div>
        <div class="mb-6">
          <label class="block text-sm font-semibold mb-1">Login Sebagai</label>
          <select name="role" class="w-full border rounded-lg p-2 bg-white">
            <option value="mahasiswa">Mahasiswa</option>
            <option value="operator">Operator</option>
            <option value="admin">Admin</option>
          </select>
        </div>
        <button
          type="submit"
          class="w-full bg-blue-600 text-white py-2 rounded-lg hover:bg-blue-700 transition"
        >
          Masuk
        </button>
      </form>
    </div>
  </body>
</html>
